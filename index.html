/* ── SWIPE GESTURES — Android & iOS FIXED ── */
(function(){
  let startX = 0, startY = 0, moved = false;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    moved = true;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if(!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Only horizontal swipes (dx dominant, minimum 50px)
    if(Math.abs(dx) < 50) return;
    if(Math.abs(dy) > Math.abs(dx) * 0.8) return;
    const totalSlides = window._totalSlides || document.querySelectorAll('.slide').length;
    // RTL layout: swipe RIGHT → go to PREVIOUS tab, swipe LEFT → NEXT tab
    if(dx < -50) goTo(Math.min(current + 1, totalSlides - 1));
    if(dx >  50) goTo(Math.max(current - 1, 0));
  }, { passive: true });
})();

let allSlides=[], allContent=[], allSpecs=[], allCerts=[], allPrice=[], offerMeta={};

async function loadAll(){

    db.from('presentation_slides').select('*').eq('is_active',true).order('slide_order'),
    db.from('slide_content').select('*').eq('is_active',true).order('block_order'),

const gs = key => allSpecs.filter(x=>x.product_key===key);
const gce= key => allCerts.filter(x=>x.product_key===key);
const idx= sl  => allSlides.indexOf(sl);

/* ── COVER ── */
function renderCover(sl){
  const bullets = gc('cover').filter(x=>x.block_type==='bullet');

  <div class="slide active" id="slide-0" style="background:${sl.bg_color};min-height:100vh;padding:68px 48px 48px">

  const items = gc(sl.slide_key);

    ${sl.image_url?`<img src="${sl.image_url}" class="hero-img" onerror="this.style.display='none'">` :''}
    <div class="grid3">

/* ── RENDER ALL ── */
function renderAll(){
  const main = document.getElementById('main');
  const nav  = document.getElementById('nav-buttons');
  let html = '';

  allSlides.forEach((sl,i)=>{
    if     (sl.layout==='cover')      html += renderCover(sl);
    else if(sl.layout==='contact')    html += renderContact(sl);
    else if(sl.layout==='image_full') html += renderModule(sl);
    else if(sl.layout==='table' && sl.slide_key==='fire')  html += renderFireTable(sl);
    else if(sl.layout==='table' && sl.slide_key==='price') html += renderPriceTable(sl);
    else if(sl.layout==='two-col')    html += renderTwoCol(sl);
    else if(sl.slide_key==='surfaces') html += renderSurfaces(sl);
    else html += renderGrid3(sl);
  });

  // Tab 12 — static
  html += renderWorkPlan();
  // Tab 13 — static
  html += renderTeam();
  // Tab 14 — site photos placeholder
  html += renderSitePhotos();
  // Tab 15 — microtopping process + video
  html += renderProcess();

  // Build nav AFTER html is injected so DOM slide count is accurate
  main.innerHTML = html;
  const totalNow = document.querySelectorAll('.slide').length;

  // Supabase tabs use slide_order from DB; static tabs are fixed
  const staticTabs = [
    [totalNow-4, '12. נהלי עבודה'],
    [totalNow-3, '13. קבוצת ביצוע'],
    [totalNow-2, '14. תמונות מצב קיים'],
    [totalNow-1, '15. תהליך יישום'],
  ];

  nav.innerHTML = allSlides.map((sl,i)=>`
    <button class="nav-btn ${i===0?'active':''}" onclick="goTo(${i})">${sl.slide_order}. ${sl.title}</button>
  `).join('') + staticTabs.map(([idx,label])=>`
    <button class="nav-btn" onclick="goTo(${idx})">${label}</button>
  `).join('');

  // Store total for swipe/keyboard
  window._totalSlides = totalNow;
}

function goTo(i){
  document.querySelectorAll('.slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.nav-btn').forEach((b,j)=>{
    b.classList.toggle('active',j===i);
    // Scroll active nav button into view on mobile
    if(j===i) b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
  current=i;
  window.scrollTo(0,0);

  // Lazy-load iframes only when their slide becomes active
  const activeSlide = document.querySelectorAll('.slide')[i];
  if(activeSlide){
    activeSlide.querySelectorAll('iframe.lazy-iframe').forEach(fr=>{
      if(fr.dataset.src && fr.src !== fr.dataset.src){
        fr.src = fr.dataset.src;
      }
    });
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowUp')   goTo(Math.max(current-1,0));
  if(e.key==='ArrowLeft' ||e.key==='ArrowDown') goTo(Math.min(current+1,(window._totalSlides||99)-1));
});

(async()=>{
  try{
    await loadAll();
    renderAll();
    document.getElementById('loading').style.display='none';
  }catch(e){
    document.getElementById('loading').innerHTML=`<p style="color:red">שגיאה: ${e.message}</p>`;
    console.error(e);
  }
})();

/* ── SWIPE GESTURES — Android & iOS FIXED ── */
(function(){
  let startX = 0, startY = 0, moved = false;

  document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    moved = true;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    if(!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Only horizontal swipes (dx dominant, minimum 50px)
    if(Math.abs(dx) < 50) return;
    if(Math.abs(dy) > Math.abs(dx) * 0.8) return;
    const totalSlides = window._totalSlides || document.querySelectorAll('.slide').length;
    // RTL layout: swipe RIGHT → go to PREVIOUS tab, swipe LEFT → NEXT tab
    if(dx < -50) goTo(Math.min(current + 1, totalSlides - 1));
    if(dx >  50) goTo(Math.max(current - 1, 0));
  }, { passive: true });
})();
